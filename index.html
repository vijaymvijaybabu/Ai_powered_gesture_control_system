<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8"/>

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>GestureAI — Advanced Hand Gesture System</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>

<style>

:root{
  --bg:#050810;
  --surface:#0d1120;
  --surface2:#141928;
  --border:#1e2a45;
  --accent:#00f5a0;
  --accent2:#00b4ff;
  --warn:#ff6b35;
  --text:#e8eaf2;
  --muted:#5a6585;
  --font-head:'Syne',sans-serif;
  --font-mono:'Space Mono',monospace;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-head);
  min-height:100vh;
  overflow-x:hidden;
}

body::before{
  content:'';
  position:fixed;
  inset:0;

  background-image:
  linear-gradient(rgba(0,245,160,.03) 1px, transparent 1px),
  linear-gradient(90deg, rgba(0,245,160,.03) 1px, transparent 1px);

  background-size:40px 40px;

  z-index:0;
}

/* HEADER */

header{
  position:relative;
  z-index:10;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:18px 32px;

  border-bottom:1px solid var(--border);

  background:rgba(5,8,16,.85);

  backdrop-filter:blur(12px);
}

.logo{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo-icon{
  width:40px;
  height:40px;

  border-radius:10px;

  background:linear-gradient(
    135deg,
    var(--accent),
    var(--accent2)
  );

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:20px;
}

.logo h1{
  font-size:1.4rem;
  font-weight:800;
}

.logo span{
  color:var(--accent);
}

.header-stats{
  display:flex;
  gap:20px;
}

.stat-pill{
  display:flex;
  align-items:center;
  gap:8px;

  padding:6px 14px;

  border-radius:20px;

  border:1px solid var(--border);

  background:var(--surface);

  font-size:0.72rem;

  font-family:var(--font-mono);
}

.dot{
  width:8px;
  height:8px;

  border-radius:50%;

  background:var(--accent);

  box-shadow:0 0 10px var(--accent);

  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%,100%{opacity:1}
  50%{opacity:.4}
}

.toggle-btn{
  padding:8px 20px;

  border-radius:8px;

  border:1px solid var(--accent);

  background:transparent;

  color:var(--accent);

  cursor:pointer;

  transition:.2s;
}

.toggle-btn:hover,
.toggle-btn.active{
  background:var(--accent);
  color:var(--bg);
}

/* MAIN */

main{
  position:relative;
  z-index:1;

  display:grid;

  grid-template-columns:1fr 380px;

  gap:20px;

  max-width:1500px;

  margin:auto;

  padding:20px;
}

/* VIDEO */

.video-panel{
  position:relative;

  background:var(--surface);

  border:1px solid var(--border);

  border-radius:16px;

  overflow:hidden;
}

.video-panel img{
  width:100%;
  display:block;
}

.video-overlay{
  position:absolute;

  bottom:0;
  left:0;
  right:0;

  padding:20px;

  background:linear-gradient(
    transparent,
    rgba(5,8,16,.95)
  );

  display:flex;
  gap:12px;
}

.gesture-badge,
.action-badge{
  flex:1;

  padding:12px 16px;

  border-radius:10px;

  border:1px solid var(--border);

  background:rgba(13,17,32,.85);

  backdrop-filter:blur(8px);
}

.label{
  font-size:.65rem;
  color:var(--muted);
  margin-bottom:4px;
  font-family:var(--font-mono);
}

.value{
  font-size:1.2rem;
  font-weight:700;
}

#gesture-name{
  color:var(--accent);
}

#action-label{
  color:var(--accent2);
}

/* SIDEBAR */

.sidebar{
  display:flex;
  flex-direction:column;
  gap:16px;
}

.card{
  background:var(--surface);

  border:1px solid var(--border);

  border-radius:14px;

  padding:18px;
}

.card-title{
  font-size:.72rem;

  letter-spacing:2px;

  color:var(--muted);

  margin-bottom:14px;

  text-transform:uppercase;

  font-family:var(--font-mono);
}

/* CONFIDENCE */

.conf-bar-bg{
  height:8px;

  border-radius:4px;

  overflow:hidden;

  margin-top:8px;

  background:var(--surface2);
}

.conf-bar-fill{
  height:100%;

  width:0%;

  border-radius:4px;

  background:linear-gradient(
    90deg,
    var(--accent2),
    var(--accent)
  );
}

/* METRICS */

.metrics-row{
  display:flex;
  gap:10px;
  margin-top:12px;
}

.metric-box{
  flex:1;

  text-align:center;

  padding:10px;

  border-radius:8px;

  border:1px solid var(--border);

  background:var(--surface2);
}

.m-label{
  font-size:.6rem;
  color:var(--muted);
  font-family:var(--font-mono);
}

.m-value{
  margin-top:4px;
  font-size:1.1rem;
  font-weight:800;
}

/* LANDMARK */

#landmark-canvas{
  width:100%;
  height:180px;

  border-radius:10px;

  background:var(--surface2);
}

/* GESTURES */

.gesture-list{
  display:flex;
  flex-direction:column;
  gap:6px;

  max-height:320px;

  overflow-y:auto;
}

.gesture-item{
  display:flex;
  align-items:center;
  gap:10px;

  padding:10px;

  border-radius:8px;

  background:var(--surface2);

  transition:.2s;
}

.gesture-item.active{
  border:1px solid var(--accent);

  background:rgba(0,245,160,.08);
}

.g-icon{
  font-size:1.2rem;
}

.g-name{
  font-size:.82rem;
  font-weight:600;
}

.g-desc{
  font-size:.68rem;
  color:var(--muted);
}

.g-badge{
  margin-left:auto;

  font-size:.65rem;

  padding:3px 8px;

  border-radius:10px;

  background:var(--surface);
}

/* IMAGE PREDICTION */

.upload-box input{
  width:100%;

  margin-bottom:10px;

  padding:10px;

  border-radius:8px;

  border:1px solid var(--border);

  background:var(--surface2);

  color:white;
}

.predict-btn{
  width:100%;

  padding:10px;

  border:none;

  border-radius:8px;

  background:var(--accent);

  color:black;

  font-weight:700;

  cursor:pointer;
}

#predictionImage{
  width:100%;
  margin-top:15px;

  border-radius:10px;

  display:none;
}

#predictionText{
  margin-top:12px;
  color:var(--accent);
}

#predictionConfidence{
  color:var(--accent2);
}

/* HISTORY */

#history-list{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.history-item{
  padding:10px;

  border-radius:8px;

  background:var(--surface2);
}

@media(max-width:1000px){

  main{
    grid-template-columns:1fr;
  }

}

</style>
</head>

<body>

<header>

<div class="logo">
  <div class="logo-icon">🖐</div>
  <h1>Gesture<span>AI</span></h1>
</div>

<div class="header-stats">

  <div class="stat-pill">
    <div class="dot"></div>
    <span id="fps-label">-- FPS</span>
  </div>

  <div class="stat-pill" id="hand-pill">
    No Hand
  </div>

</div>

<button
  class="toggle-btn active"
  id="ctrl-btn"
  onclick="toggleControl()"
>
⚡ Control ON
</button>

</header>

<main>

<!-- VIDEO -->

<div class="video-panel">

  <img
    src="/video_feed"
    id="video-feed"
  />

  <div class="video-overlay">

    <div class="gesture-badge">
      <div class="label">
        DETECTED GESTURE
      </div>

      <div class="value" id="gesture-name">
        Waiting...
      </div>
    </div>

    <div class="action-badge">
      <div class="label">
        ACTION
      </div>

      <div class="value" id="action-label">
        —
      </div>
    </div>

  </div>

</div>

<!-- SIDEBAR -->

<div class="sidebar">

  <!-- CONFIDENCE -->

  <div class="card">

    <div class="card-title">
      Confidence Score
    </div>

    <div style="display:flex;justify-content:space-between">

      <span id="conf-pct">0%</span>

      <span id="conf-status">—</span>

    </div>

    <div class="conf-bar-bg">
      <div class="conf-bar-fill" id="conf-bar"></div>
    </div>

    <div class="metrics-row">

      <div class="metric-box">
        <div class="m-label">FPS</div>
        <div class="m-value" id="fps-val">—</div>
      </div>

      <div class="metric-box">
        <div class="m-label">HAND</div>
        <div class="m-value" id="hand-val">—</div>
      </div>

      <div class="metric-box">
        <div class="m-label">CTRL</div>
        <div class="m-value" id="ctrl-val">ON</div>
      </div>

    </div>

  </div>

  <!-- LANDMARK -->

  <div class="card">

    <div class="card-title">
      Landmark Map
    </div>

    <canvas
      id="landmark-canvas"
      width="320"
      height="180"
    ></canvas>

  </div>

  <!-- GESTURES -->

  <div class="card">

    <div class="card-title">
      Gesture Dictionary
    </div>

    <div
      class="gesture-list"
      id="gesture-list"
    ></div>

  </div>

  <!-- IMAGE PREDICTION -->

  <div class="card">

    <div class="card-title">
      Image Gesture Prediction
    </div>

    <div class="upload-box">

      <input
        type="file"
        id="imageUpload"
        accept="image/*"
      />

      <button
        class="predict-btn"
        onclick="predictImage()"
      >
        Predict Gesture
      </button>

      <img id="predictionImage"/>

      <h2 id="predictionText"></h2>

      <p id="predictionConfidence"></p>

    </div>

  </div>

  <!-- HISTORY -->

  <div class="card">

    <div class="card-title">
      Gesture History
    </div>

    <div id="history-list"></div>

  </div>

</div>

</main>

<script>

/* ICONS */

const ICONS = {

  "Open Palm":"🖐",
  "Fist":"✊",
  "Thumbs Up":"👍",
  "Thumbs Down":"👎",
  "Peace / V":"✌️",
  "Point Up":"☝️",
  "Point Right":"👉",
  "Point Left":"👈",
  "OK Sign":"👌",
  "Rock On":"🤘",
  "Call Me":"🤙",
  "Pinch":"🤏",

  "Three Fingers":"3️⃣",
  "Four Fingers":"4️⃣",
  "Gun Gesture":"🔫",
  "Heart Sign":"❤️",
};

/* BUILD GESTURE LIST */

async function buildGestureList(){

  const res = await fetch('/gestures_list');

  const gestures = await res.json();

  const container =
  document.getElementById('gesture-list');

  container.innerHTML = '';

  gestures.forEach(g=>{

    const div = document.createElement('div');

    div.className = 'gesture-item';

    div.id =
      'g-' +
      g.name.replace(/\s/g,'_')
      .replace(/\//g,'-');

    div.innerHTML = `

      <span class="g-icon">
        ${ICONS[g.name] || '🖐'}
      </span>

      <div>
        <div class="g-name">${g.name}</div>
        <div class="g-desc">${g.description}</div>
      </div>

      <span class="g-badge">—</span>
    `;

    container.appendChild(div);

  });

}

/* LANDMARKS */

const CONNECTIONS = [
[0,1],[1,2],[2,3],[3,4],
[0,5],[5,6],[6,7],[7,8],
[5,9],[9,10],[10,11],[11,12],
[9,13],[13,14],[14,15],[15,16],
[13,17],[17,18],[18,19],[19,20],
[0,17]
];

function drawLandmarks(landmarks){

  const canvas =
  document.getElementById('landmark-canvas');

  const ctx = canvas.getContext('2d');

  const W = canvas.width;

  const H = canvas.height;

  ctx.clearRect(0,0,W,H);

  if(!landmarks || landmarks.length < 21){

    ctx.fillStyle = '#1e2a45';

    ctx.fillRect(0,0,W,H);

    ctx.fillStyle = '#5a6585';

    ctx.font = '13px Arial';

    ctx.textAlign = 'center';

    ctx.fillText(
      'No hand detected',
      W/2,
      H/2
    );

    return;
  }

  const px = lm => lm.x * W;

  const py = lm => lm.y * H;

  ctx.strokeStyle = '#00f5a0';

  ctx.lineWidth = 2;

  CONNECTIONS.forEach(([a,b])=>{

    ctx.beginPath();

    ctx.moveTo(px(landmarks[a]),py(landmarks[a]));

    ctx.lineTo(px(landmarks[b]),py(landmarks[b]));

    ctx.stroke();

  });

  landmarks.forEach((lm,i)=>{

    ctx.beginPath();

    ctx.arc(
      px(lm),
      py(lm),
      4,
      0,
      Math.PI*2
    );

    ctx.fillStyle =
      [4,8,12,16,20].includes(i)
      ? '#00f5a0'
      : '#ffffff';

    ctx.fill();

  });

}

/* POLLING */

let currentGesture = '';

async function pollData(){

  try{

    const res =
    await fetch('/gesture_data');

    const d = await res.json();

    document.getElementById('fps-label')
    .textContent = d.fps + ' FPS';

    document.getElementById('hand-pill')
    .textContent =
      d.hand_detected
      ? '🟢 Hand Detected'
      : '🔴 No Hand';

    document.getElementById('gesture-name')
    .textContent =
      d.current_gesture || '—';

    document.getElementById('action-label')
    .textContent =
      d.action || '—';

    document.getElementById('fps-val')
    .textContent = d.fps;

    document.getElementById('hand-val')
    .textContent =
      d.hand_detected ? '✓' : '✗';

    document.getElementById('ctrl-val')
    .textContent =
      d.control_enabled ? 'ON' : 'OFF';

    const conf = d.confidence || 0;

    document.getElementById('conf-pct')
    .textContent =
      Math.round(conf*100)+'%';

    document.getElementById('conf-bar')
    .style.width =
      (conf*100)+'%';

    drawLandmarks(d.landmarks);

    if(d.current_gesture !== currentGesture){

      if(currentGesture){

        const prev =
        document.getElementById(
          'g-' +
          currentGesture
          .replace(/\s/g,'_')
          .replace(/\//g,'-')
        );

        if(prev){

          prev.classList.remove('active');

        }

      }

      currentGesture = d.current_gesture;

      const curr =
      document.getElementById(
        'g-' +
        currentGesture
        .replace(/\s/g,'_')
        .replace(/\//g,'-')
      );

      if(curr){

        curr.classList.add('active');

        curr.querySelector('.g-badge')
        .textContent =
          Math.round(conf*100)+'%';

      }

    }

  }catch(e){}

  setTimeout(pollData,100);

}

/* TOGGLE */

async function toggleControl(){

  const res =
  await fetch('/toggle_control',{
    method:'POST'
  });

  const d = await res.json();

  const btn =
  document.getElementById('ctrl-btn');

  if(d.control_enabled){

    btn.textContent =
    '⚡ Control ON';

    btn.className =
    'toggle-btn active';

  }else{

    btn.textContent =
    '⏸ Control OFF';

    btn.className =
    'toggle-btn';

  }

}

/* IMAGE PREDICTION */

async function predictImage(){

  const fileInput =
  document.getElementById(
    'imageUpload'
  );

  if(!fileInput.files.length){

    alert('Select image first');

    return;
  }

  const formData = new FormData();

  formData.append(
    'image',
    fileInput.files[0]
  );

  const res =
  await fetch('/predict_image',{

    method:'POST',

    body:formData

  });

  const data = await res.json();

  if(!data.success){

    alert(data.message);

    return;
  }

  document.getElementById(
    'predictionImage'
  ).src =
    data.image_url +
    '?t=' + Date.now();

  document.getElementById(
    'predictionImage'
  ).style.display =
    'block';

  document.getElementById(
    'predictionText'
  ).innerHTML =
    '🖐 ' + data.gesture;

  document.getElementById(
    'predictionConfidence'
  ).innerHTML =
    'Confidence: ' +
    Math.round(
      data.confidence * 100
    ) + '%';

}

/* HISTORY */

async function loadHistory(){

  const res =
  await fetch('/gesture_history');

  const data =
  await res.json();

  const container =
  document.getElementById(
    'history-list'
  );

  container.innerHTML = '';

  data.reverse().forEach(item=>{

    const div =
    document.createElement('div');

    div.className = 'history-item';

    div.innerHTML = `

      <div style="
        color:#00f5a0;
        font-weight:bold;
      ">
        ${item.gesture}
      </div>

      <div style="
        color:#00b4ff;
        font-size:12px;
      ">
        ${Math.round(
          item.confidence*100
        )}%
      </div>

      <div style="
        color:gray;
        font-size:11px;
      ">
        ${item.time}
      </div>
    `;

    container.appendChild(div);

  });

}

setInterval(loadHistory,1000);

/* INIT */

buildGestureList();

pollData();

</script>

</body>
  </html>
